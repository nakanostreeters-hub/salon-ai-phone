<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>じゅうみんカード — PREMIER MODELS むら</title>
<style>
  :root {
    --bg-top: #bfe3ff;
    --bg-mid: #e6f6d8;
    --bg-bottom: #c7eaa9;
    --card: #fffdf7;
    --card-alt: #fff8e7;
    --ink: #3d3a2f;
    --ink-soft: #6b6657;
    --muted: #9a907a;
    --border: #f2ead1;
    --shadow-soft: 0 6px 0 #e9dcb6, 0 10px 22px rgba(90, 70, 30, 0.14);
    --shadow-inset: inset 0 2px 0 rgba(255,255,255,0.7);
    --pink: #ffb4c7;
    --pink-deep: #ff6f92;
    --mint: #a9dfb7;
    --mint-deep: #4ca97a;
    --lemon: #ffe49a;
    --lemon-deep: #d9a23a;
    --sky: #a7d8ff;
    --sky-deep: #4a95d4;
    --violet-a: #c9b3ff;
    --violet-b: #8a7ddb;
    --violet-c: #6e5cc4;
    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-sm: 14px;
    --font: "Hiragino Maru Gothic ProN", "M PLUS Rounded 1c", "Quicksand",
            "Yu Gothic", "ヒラギノ角ゴ ProN", sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
  }
  body {
    font-family: var(--font);
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 10%, #ffffff80 0, transparent 40%),
      radial-gradient(circle at 80% 0%, #ffffff66 0, transparent 35%),
      linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 55%, var(--bg-bottom) 100%);
    background-attachment: fixed;
    font-size: 15px;
    line-height: 1.7;
    letter-spacing: 0.02em;
    -webkit-font-smoothing: antialiased;
    padding: 18px 14px 60px;
  }

  /* ─── ふわふわ雲 ─── */
  body::before, body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.7);
    filter: blur(1px);
    z-index: 0;
    pointer-events: none;
  }
  body::before { width: 120px; height: 40px; top: 40px; left: -20px; }
  body::after  { width: 160px; height: 50px; top: 120px; right: -30px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
  }

  /* ─── ヘッダー ─── */
  .page-header {
    text-align: center;
    padding: 8px 0 18px;
    color: #2a4a3c;
  }
  .page-header .salon {
    display: inline-block;
    background: #fff;
    color: #4ca97a;
    padding: 6px 18px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.08em;
    box-shadow: 0 3px 0 #d9c890, 0 6px 14px rgba(0,0,0,0.08);
  }
  .page-header .card-label {
    margin-top: 10px;
    font-size: 22px;
    font-weight: bold;
    color: #3f6b55;
    text-shadow: 0 2px 0 #ffffff, 0 3px 4px rgba(0,0,0,0.08);
  }
  .page-header .card-label .no {
    color: var(--pink-deep);
  }

  /* ─── カード共通 ─── */
  .card {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 22px 20px;
    box-shadow: var(--shadow-soft);
    margin-bottom: 18px;
    border: 2px solid #fff;
    position: relative;
  }
  .card h2 {
    margin: 0 0 14px;
    font-size: 17px;
    color: var(--mint-deep);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* 葉っぱデコ */
  .leaf {
    position: absolute;
    width: 22px;
    height: 22px;
    pointer-events: none;
    opacity: 0.8;
  }

  /* ─── キャラクターカード ─── */
  .char-card {
    text-align: center;
    padding: 26px 20px 24px;
    background:
      radial-gradient(circle at 50% 20%, #fff 0%, #fffaee 60%, #fff2d0 100%);
  }
  .animal-circle {
    width: 150px;
    height: 150px;
    margin: 0 auto 12px;
    border-radius: 50%;
    background: #fff;
    box-shadow:
      inset 0 -6px 0 #f3e7c4,
      0 6px 0 #e9dcb6,
      0 10px 22px rgba(90, 70, 30, 0.16);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .animal-circle svg {
    width: 110px;
    height: 110px;
  }
  .animal-circle .sparkle {
    position: absolute;
    font-size: 20px;
  }
  .animal-circle .sparkle.s1 { top: -4px; right: 6px; }
  .animal-circle .sparkle.s2 { bottom: 6px; left: -4px; font-size: 16px; }

  .char-name {
    font-size: 24px;
    font-weight: bold;
    color: var(--ink);
    margin: 6px 0 2px;
  }
  .char-name .animal-suffix {
    color: var(--mint-deep);
    margin-left: 6px;
  }
  .char-heart {
    font-size: 18px;
    color: var(--pink-deep);
    font-weight: bold;
  }
  .char-heart .small {
    font-size: 13px;
    color: var(--muted);
    margin-left: 6px;
    font-weight: normal;
  }
  .char-heart-note {
    font-size: 12px;
    color: var(--muted);
    font-weight: normal;
    margin-top: 2px;
  }

  /* ─── ご無沙汰バッジ（右上） ─── */
  .away-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: #fff1dc;
    color: #b35a1a;
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: bold;
    box-shadow: 0 2px 0 #e9c58a, inset 0 1px 0 rgba(255,255,255,0.7);
    z-index: 2;
  }

  /* ─── 次のマイルストーン（ぼんやり表示） ─── */
  .reward.next-goal {
    background: #f7f3e6;
    border-style: dashed;
    opacity: 0.7;
  }
  .reward.next-goal .emoji {
    filter: grayscale(0.3);
    opacity: 0.75;
  }
  .reward.next-goal .label {
    color: var(--ink-soft);
    font-weight: normal;
  }
  .reward.next-goal .mini {
    display: block;
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ─── 16タイプ枠 ─── */
  .mbti-box {
    margin: 18px -4px 0;
    padding: 18px 16px;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--violet-a) 0%, var(--violet-b) 55%, var(--violet-c) 100%);
    color: #fff;
    text-align: center;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.35), 0 4px 0 #5746a6;
  }
  .mbti-box .mbti-label {
    font-size: 12px;
    letter-spacing: 0.2em;
    opacity: 0.9;
  }
  .mbti-box .mbti-4 {
    font-size: 34px;
    font-weight: bold;
    letter-spacing: 0.12em;
    margin: 2px 0 2px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.18);
  }
  .mbti-box .mbti-nick {
    font-size: 17px;
    color: #fff7ce;
  }
  .mbti-box.pending .mbti-4 {
    font-size: 18px;
    letter-spacing: 0.04em;
    opacity: 0.9;
  }
  .mbti-box.pending .mbti-nick { display: none; }

  /* ─── じょうたい・バッジ ─── */
  .stat-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
    justify-content: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: bold;
    box-shadow: 0 2px 0 rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.7);
  }
  .badge.state-NEW      { background: #fff3cf; color: #c68a1a; }
  .badge.state-げんき    { background: #d6f4df; color: #2f8b52; }
  .badge.state-おやすみ  { background: #dfe9f5; color: #456f96; }
  .badge.state-とびっきり{ background: #ffd9e6; color: #c03265; }
  .badge.visit  { background: #e7f1ff; color: #3a6da8; }
  .badge.recent { background: #fff2d7; color: #b07818; }

  /* ─── セクション見出し ─── */
  .sec-title {
    font-size: 16px;
    font-weight: bold;
    color: var(--mint-deep);
    margin: 0 0 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sec-body {
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.85;
  }
  .tips {
    margin: 0;
    padding: 0;
    list-style: none;
  }
  .tips li {
    position: relative;
    padding: 8px 10px 8px 32px;
    margin-bottom: 6px;
    background: #fffaec;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    font-size: 14.5px;
    line-height: 1.7;
  }
  .tips li::before {
    content: "🌿";
    position: absolute;
    left: 8px;
    top: 6px;
  }

  /* ─── ことばのおくりもの ─── */
  .letter-card {
    background:
      repeating-linear-gradient(
        180deg,
        #fff 0 28px,
        #fff4d9 28px 29px
      );
    border: 1.5px dashed #e5cf8a;
    border-radius: var(--radius-md);
    padding: 16px 16px 18px;
    color: #554b2e;
    font-size: 14.5px;
    line-height: 28px;
    white-space: pre-wrap;
  }
  .letter-tag {
    display: inline-block;
    margin-bottom: 8px;
    padding: 3px 10px;
    border-radius: 999px;
    background: #fff;
    color: var(--pink-deep);
    font-size: 12px;
    font-weight: bold;
    box-shadow: 0 2px 0 #e9dcb6;
  }
  .copy-btn {
    margin-top: 10px;
    padding: 8px 14px;
    border: none;
    border-radius: 999px;
    background: var(--pink-deep);
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 3px 0 #c5436a;
  }
  .copy-btn:active { transform: translateY(1px); box-shadow: 0 2px 0 #c5436a; }

  /* ─── なかよしさん ─── */
  .friend {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: #fff4f8;
    border-radius: var(--radius-sm);
  }
  .friend .bubble {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--pink);
    color: #fff;
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.5);
  }
  .friend .name { font-weight: bold; }
  .friend .reason { font-size: 13px; color: var(--ink-soft); }

  /* ─── ごほうびバッジ ─── */
  .reward-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }
  .reward {
    background: #fffaec;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    text-align: center;
    font-size: 12.5px;
    color: var(--ink-soft);
    box-shadow: inset 0 2px 0 #fff;
  }
  .reward .emoji { font-size: 28px; display: block; margin-bottom: 2px; }
  .reward .label { font-weight: bold; color: var(--ink); }

  /* ─── 状態 ─── */
  .loading-wrap, .error-wrap {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
  }
  .spinner {
    display: inline-block;
    width: 28px; height: 28px;
    border: 4px solid #fff;
    border-right-color: var(--mint-deep);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  /* ─── レスポンシブ ─── */
  @media (min-width: 640px) {
    body { padding: 28px 20px 80px; font-size: 16px; }
    .animal-circle { width: 180px; height: 180px; }
    .animal-circle svg { width: 130px; height: 130px; }
    .char-name { font-size: 26px; }
  }

  @media (max-width: 360px) {
    .mbti-box .mbti-4 { font-size: 28px; }
    .char-name { font-size: 22px; }
  }

  /* 小さなふわふわアニメ */
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }
  .animal-circle svg { animation: bob 3.2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div class="salon">🌿 PREMIER MODELS むら</div>
    <div class="card-label">じゅうみんカード <span class="no" id="karteNoLabel">#----</span></div>
  </div>

  <div id="loading" class="loading-wrap">
    <div class="spinner"></div>
    <p>カードを よみこんでいます…</p>
  </div>

  <div id="errorBox" class="card hidden">
    <div class="error-wrap">
      <p id="errorMsg">よみこみに失敗しました</p>
    </div>
  </div>

  <div id="content" class="hidden">
    <!-- キャラクターカード -->
    <section class="card char-card">
      <span class="leaf" id="leafLeft" style="top:10px;left:10px">🍃</span>
      <span class="leaf" id="leafRight" style="top:10px;right:10px;transform:scaleX(-1)">🍃</span>
      <span class="away-badge hidden" id="awayBadge">⚠️ ご無沙汰</span>

      <div class="animal-circle">
        <span class="sparkle s1">✨</span>
        <span class="sparkle s2">💫</span>
        <div id="animalSvg"></div>
      </div>
      <div class="char-name">
        <span id="charName">—</span>
        <span class="animal-suffix" id="animalSuffix"></span>
      </div>
      <div class="char-heart">
        ♥ <span id="heartLevel">—</span>
        <span class="small">なかよしレベル</span>
        <div class="char-heart-note">来店ごとに +1</div>
      </div>

      <div class="mbti-box" id="mbtiBox">
        <div class="mbti-label">16タイプ</div>
        <div class="mbti-4" id="mbti4">----</div>
        <div class="mbti-nick" id="mbtiNick">—</div>
      </div>

      <div class="stat-row" id="statRow"></div>
    </section>

    <!-- こんなひと -->
    <section class="card">
      <h2 class="sec-title">❤️ こんなひと</h2>
      <div class="sec-body" id="personalityBody">—</div>
    </section>

    <!-- おもてなしのヒント -->
    <section class="card">
      <h2 class="sec-title">🎯 おもてなしのヒント</h2>
      <ul class="tips" id="tipsList"></ul>
    </section>

    <!-- なかよしさん -->
    <section class="card hidden" id="friendSection">
      <h2 class="sec-title">💞 なかよしさん</h2>
      <div class="friend">
        <div class="bubble" id="friendInitial">—</div>
        <div>
          <div class="name" id="friendName">—</div>
          <div class="reason" id="friendReason">—</div>
        </div>
      </div>
    </section>

    <!-- ことばのおくりもの -->
    <section class="card">
      <h2 class="sec-title">💌 ことばのおくりもの</h2>
      <div class="letter-tag" id="letterTag">LINEメッセージ案</div>
      <div class="letter-card" id="letterBody">—</div>
      <button class="copy-btn" id="copyBtn">💌 コピーする</button>
    </section>

    <!-- ごほうび -->
    <section class="card">
      <h2 class="sec-title">🎁 ごほうび</h2>
      <div class="reward-grid" id="rewardGrid"></div>
    </section>
  </div>
</div>

      nickname: '世話好きの親友',
      personality:
        '人とのつながりを大切にする、社交的でやさしい方。スタッフの名前・出身・最近の出来事まで覚えていてくださる、常連の鑑のようなじゅうみんさんです。' +
        '「ありがとう」「お疲れさま」を欠かさない方なので、こちらからも温度のある対応を返してあげたいタイプ。',
      tips: [
        '前回の会話の続きから話し始めると、とても喜ばれます。（「お子さんの発表会どうでした？」など）',
        'お友達紹介に積極的な方が多いので、紹介カードや特典を用意しておくと効果大。',
        '季節の挨拶・お礼のLINEは習慣化すると、ファン度がさらに上がります。',
      ],
      letter:
        '○○さん、お元気でお過ごしですか🌸\n\n' +
        'いつもあたたかいお気遣いをいただき、本当にありがとうございます。\n' +
        'しばらくお顔を拝見できていないので、ちょっと心配になってご連絡しました。\n\n' +
        'ご都合の良いときに、お気軽にお立ち寄りくださいね。\n' +
        '○○さんとのおしゃべり、いつも楽しみにしております☕',
    },
  };

  const DEFAULT_TIPS = [
    'まずは一言「ようこそ」。顔を覚えていることを伝えると安心されます。',
    'メニュー決めは急がせず、イメージ写真を見せながらゆっくり。',
    'お会計時に次回の目安をさりげなく添えると、次の来店につながります。',
  ];
  const DEFAULT_PERSONALITY =
    'これから少しずつ、お人柄が見えてくるじゅうみんさんです。' +
    '来店ごとの小さな会話を大切にしていくと、16タイプ分析の精度も上がっていきます。';

  // ─────────────────────────────────────────────
  // 描画ロジック
  // ─────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d)) return '—';
    return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
  }

  // 次のマイルストーン（来店回数 or 年数、近い方を返す）
  function computeNextMilestone(c) {
    const vc = Number(c.visit_count) || 0;
    const visitSteps = [
      { n: 10,  emoji: '✨', label: '10回達成' },
      { n: 20,  emoji: '⭐', label: '20回達成' },
      { n: 48,  emoji: '💎', label: '48回達成' },
      { n: 50,  emoji: '💎', label: '50回達成' },
      { n: 100, emoji: '👑', label: '100回達成' },
    ];
    const nextVisit = visitSteps.find(s => s.n > vc);

    const first = c.first_visit_at ? new Date(c.first_visit_at) : null;
    let nextYear = null;
    if (first && !isNaN(first)) {
      const years = (Date.now() - first.getTime()) / (365.25 * 24 * 60 * 60 * 1000);
      const yearSteps = [
        { n: 1,  emoji: '🌱', label: '1年クルー' },
        { n: 5,  emoji: '🎖️', label: '5年クルー' },
        { n: 10, emoji: '🏅', label: '10年クルー' },
      ];
      const s = yearSteps.find(s => s.n > years);
      if (s) {
        const remainYears = Math.max(0, s.n - years);
        const remainMonths = Math.ceil(remainYears * 12);
        nextYear = { ...s, hint: `あと${remainMonths}ヶ月で達成`, sortKey: remainMonths / 12 };
      }
    }

    let nextVisitObj = null;
    if (nextVisit) {
      const remain = nextVisit.n - vc;
      // おおよその到達時期（年/12ヶ月で visits/year を推定）
      let yearsUntil = 0;
      if (first && !isNaN(first) && vc > 0) {
        const rel = (Date.now() - first.getTime()) / (365.25 * 24 * 60 * 60 * 1000);
        const rate = vc / Math.max(rel, 0.5); // visits / year
        yearsUntil = rate > 0 ? remain / rate : 1;
      }
      nextVisitObj = { ...nextVisit, hint: `あと${remain}回で達成`, sortKey: yearsUntil };
    }

    // どちらかだけあればそれを、両方あれば近い方を返す
    const candidates = [nextVisitObj, nextYear].filter(Boolean);
    if (candidates.length === 0) return null;
    candidates.sort((a, b) => a.sortKey - b.sortKey);
    return candidates[0];
  }

  function firstName(fullName) {
    if (!fullName) return 'お客様';
    // 姓名の間に半角/全角スペースがあれば下の名前を優先。
    const parts = String(fullName).trim().split(/[\s　]+/);
    return parts.length >= 2 ? parts[parts.length - 1] : parts[0];
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }

  function renderError(msg) {
    hide('loading');
    hide('content');
    show('errorBox');
    document.getElementById('errorMsg').textContent = msg;
  }

  function renderCard(data) {
    const c = data.customer;
    document.getElementById('karteNoLabel').textContent = `#${c.karte_no}`;

    // 動物
    const animalKey = ANIMAL_SVG[c.mq_animal] ? c.mq_animal : 'sheep';
    document.getElementById('animalSvg').innerHTML = ANIMAL_SVG[animalKey];
    document.getElementById('animalSuffix').textContent = ANIMAL_JA[animalKey] || '';

    // 名前（フルネーム） + 動物名
    document.getElementById('charName').textContent = c.name || 'お客様';

    // なかよしレベル = mq_level（無ければ visit_count）
    const heart = Number(c.mq_level) || Number(c.visit_count) || 0;
    document.getElementById('heartLevel').textContent = heart;

    // 16タイプ
    const mbtiBox = document.getElementById('mbtiBox');
    if (c.mq_type_4letter) {
      mbtiBox.classList.remove('pending');
      document.getElementById('mbti4').textContent = c.mq_type_4letter;
      document.getElementById('mbtiNick').textContent = c.mq_type_nickname || '';
    } else {
      mbtiBox.classList.add('pending');
      document.getElementById('mbti4').textContent = '16タイプ分析中...';
    }

    // じょうたい・来店バッジ
    const statRow = document.getElementById('statRow');
    statRow.innerHTML = '';
    if (c.mq_state) {
      const b = document.createElement('span');
      b.className = `badge state-${c.mq_state}`;
      b.textContent = c.mq_state;
      statRow.appendChild(b);
    }
    const visitBadge = document.createElement('span');
    visitBadge.className = 'badge visit';
    visitBadge.textContent = `来店 ${c.visit_count || 0}回`;
    statRow.appendChild(visitBadge);

    if (c.last_visit_at) {
      const recent = document.createElement('span');
      recent.className = 'badge recent';
      recent.textContent = `最終 ${fmtDate(c.last_visit_at)}`;
      statRow.appendChild(recent);
    }

    // ご無沙汰判定（固定失客 or 最終来店が1年以上前）
    const lastVisit = c.last_visit_at ? new Date(c.last_visit_at) : null;
    const overOneYear = lastVisit && !isNaN(lastVisit)
      && (Date.now() - lastVisit.getTime()) >= 365 * 24 * 60 * 60 * 1000;
    const isAway = c.customer_segment === '固定失客' || overOneYear;
    if (isAway) {
      document.getElementById('awayBadge').classList.remove('hidden');
      document.getElementById('leafRight').classList.add('hidden');
    }

    // 16タイプ別テンプレート
    const tpl = (c.mq_type_4letter && MBTI_TEMPLATES[c.mq_type_4letter]) || null;

    // こんなひと
    document.getElementById('personalityBody').textContent =
      tpl ? tpl.personality : DEFAULT_PERSONALITY;

    // おもてなしのヒント
    const tipsList = document.getElementById('tipsList');
    tipsList.innerHTML = '';
    const tips = tpl ? tpl.tips : DEFAULT_TIPS;
    for (const t of tips) {
      const li = document.createElement('li');
      li.textContent = t;
      tipsList.appendChild(li);
    }

    // なかよしさん（stylist があれば表示、なければ非表示）
    if (c.stylist) {
      document.getElementById('friendSection').classList.remove('hidden');
      document.getElementById('friendName').textContent = c.stylist;
      document.getElementById('friendInitial').textContent = c.stylist.slice(0, 1);
      document.getElementById('friendReason').textContent =
        tpl ? `${tpl.nickname}タイプとの相性◎` : 'いつも担当のスタイリストさん';
    }

    // ことばのおくりもの
    const fn = firstName(c.name);
    let letter = tpl ? tpl.letter : `${fn}さん、こんにちは🌿\n\nお元気でお過ごしですか？\nまたお会いできる日を楽しみにしております。`;
    letter = letter.replace(/○○/g, fn).replace(/ひろみ/g, fn);
    document.getElementById('letterBody').textContent = letter;
    if (tpl) {
      document.getElementById('letterTag').textContent = `${c.mq_type_4letter}さん向け LINEメッセージ案`;
    }

    document.getElementById('copyBtn').addEventListener('click', () => {
      const text = document.getElementById('letterBody').textContent;
      navigator.clipboard?.writeText(text).then(
        () => { document.getElementById('copyBtn').textContent = '💌 コピーしました'; },
        () => { alert('コピーに失敗しました。長押しで選択してください。'); }
      );
    });

    // ごほうびバッジ
    const rewardGrid = document.getElementById('rewardGrid');
    rewardGrid.innerHTML = '';
    const badges = data.badges || [];
    if (badges.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'reward';
      empty.innerHTML = '<span class="emoji">🌱</span><span class="label">これから集めよう</span>';
      rewardGrid.appendChild(empty);
    } else {
      for (const b of badges) {
        const el = document.createElement('div');
        el.className = 'reward';
        el.innerHTML =
          `<span class="emoji">${b.emoji}</span><span class="label">${b.label}</span>`;
        rewardGrid.appendChild(el);
      }
    }

    // 次のマイルストーン（ぼんやり表示）
    const next = computeNextMilestone(c);
    if (next) {
      const goal = document.createElement('div');
      goal.className = 'reward next-goal';
      goal.innerHTML =
        `<span class="emoji">${next.emoji}</span>` +
        `<span class="label">${next.label}</span>` +
        `<span class="mini">${next.hint}</span>`;
      rewardGrid.appendChild(goal);
    }

    hide('loading');
    show('content');
  }

  // ─────────────────────────────────────────────
  // 起動: URL から karte_no を抽出 → API 叩く
  // ─────────────────────────────────────────────
  (async () => {
    const m = location.pathname.match(/\/character\/(\d+)/);
    if (!m) {
      renderError('URLが正しくありません (/character/:karte_no)');
      return;
    }
    const karteNo = m[1];
    document.getElementById('karteNoLabel').textContent = `#${karteNo}`;

    try {
      const res = await fetch(`/character/api/${karteNo}`);
      const json = await res.json();
      if (!res.ok || !json.success) {
        renderError(json.error || '読み込みに失敗しました');
        return;
      }
      renderCard(json);
    } catch (err) {
      renderError('通信エラー: ' + err.message);
    }
  })();
</script>
</body>
</html>
