    name: salon-ai-phone
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://tnplbtnogklqpogdzdmk.supabase.co
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: LINE_CHANNEL_ID
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL_ID
        value: C0AL35N4Y06
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SALON_NAME
        value: PREMIER MODELS 中野
      - key: KARUTEKUN_WEBHOOK_URL
        value: https://line-webhook.karutekun.com/webhook/salons/227
